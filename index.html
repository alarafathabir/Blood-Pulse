<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pulse | Precision in Care, Empathy in Service</title>
    <meta name="description" content="Blood Pulse — BAUST Campus Blood Donation Platform. Precision in Care, Empathy in Service.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --bp-primary: #af101a;
            --bp-primary-dark: #86000d;
            --bp-primary-light: #ffdad6;
            --bp-surface: #ffffff;
            --bp-on-surface: #0f172a;
            --bp-outline: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: 24px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bp-surface);
            color: var(--bp-on-surface);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
        }
        ::selection {
            background-color: var(--bp-primary);
            color: white;
        }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes reveal { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-up { animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-reveal { animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; border: 3px solid #f8fafc; }
        ::-webkit-scrollbar-thumb:hover { background: #af101a; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Premium Background Gradients */
        .bg-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, hsla(356, 83%, 37%, 0.05) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(210, 100%, 23%, 0.02) 0, transparent 50%);
        }

        #accessibility-sidebar {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10000;
        }
        #accessibility-sidebar.open { transform: translateX(0) !important; }
        #acc-toggle-btn.sidebar-open {
            left: 280px !important;
            border-radius: 0 12px 12px 0;
            background-color: var(--bp-primary-dark);
            z-index: 10001;
        }

        /* Nav Transition */
        #nav-wrapper.nav-scrolled {
            padding-top: 1rem !important;
            padding-bottom: 1rem !important;
        }
        #nav-wrapper.nav-scrolled nav {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(24px) !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1) !important;
            height: 4.5rem !important;
        }


        /* Footer Styles */
        .red-footer {
            background: #af101a;
            color: white;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .red-footer.footer-reveal {
            opacity: 1;
            transform: translateY(0);
        }
        .red-footer a {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .red-footer a:hover {
            color: white;
            padding-left: 5px;
        }
        .footer-full-container {
            max-width: 80rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        /* Accessibility Modifiers */
        .acc-grayscale { filter: grayscale(1) !important; }
        .acc-high-contrast { filter: contrast(1.5) !important; background-color: #000 !important; color: #fff !important; }
        .acc-high-contrast * { border-color: #fff !important; }
    </style>
</head>
<body class="min-h-screen w-full overflow-x-hidden">

    <div id="app" class="w-full flex flex-col min-h-screen"></div>

    <!-- Global Floating Interface (Root Level) -->
    
    <!-- Accessibility Toggle -->
    <button id="acc-toggle-btn" class="fixed left-0 top-1/4 z-[10001] bg-[#af101a] text-white p-4 rounded-r-2xl shadow-[0_10px_40px_rgba(175,16,26,0.3)] hover:scale-110 active:scale-95 transition-all flex items-center justify-center">
        <span class="material-symbols-outlined text-[32px]">accessible</span>
    </button>

    <!-- Emergency Hotline Button -->
    <button id="hotline-btn" onclick="window.showHotline()" class="fixed bottom-10 right-10 z-[9999] w-20 h-20 bg-[#af101a] text-white rounded-full shadow-[0_20px_50px_rgba(175,16,26,0.4)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all duration-500 group">
        <div class="absolute inset-0 rounded-full bg-[#af101a] animate-ping opacity-20"></div>
        <div class="absolute inset-[-8px] rounded-full border-2 border-[#af101a]/20 animate-pulse"></div>
        <span class="material-symbols-outlined text-4xl group-hover:rotate-12 transition-transform">phone_callback</span>
        <div class="absolute bottom-full right-0 mb-6 px-5 py-3 bg-[#271816] text-white text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl opacity-0 group-hover:opacity-100 pointer-events-none transition-all translate-y-2 group-hover:translate-y-0 whitespace-nowrap shadow-2xl flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            Emergency Hotline
        </div>
    </button>

    <!-- Accessibility Sidebar -->
    <div id="accessibility-sidebar" class="fixed left-0 top-0 h-full w-[280px] bg-[#af101a] text-white shadow-[10px_0_50px_rgba(0,0,0,0.3)] -translate-x-full overflow-y-auto z-[10000]">
        <div class="p-8">
            <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-4">
                <h2 class="text-2xl font-black uppercase tracking-tighter font-outfit">Accessibility</h2>
                <button id="acc-close-btn" class="p-2 hover:bg-white/10 rounded-full transition-all">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="space-y-2">
                <button onclick="toggleAccessibility('increase-text')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 transition-all flex items-center gap-4 group">
                    <span class="material-symbols-outlined group-hover:scale-125 transition-transform">zoom_in</span>
                    <span class="text-sm font-bold uppercase tracking-widest">Increase Text</span>
                </button>
                <button onclick="toggleAccessibility('decrease-text')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 transition-all flex items-center gap-4 group">
                    <span class="material-symbols-outlined group-hover:scale-125 transition-transform">zoom_out</span>
                    <span class="text-sm font-bold uppercase tracking-widest">Decrease Text</span>
                </button>
                <button onclick="toggleAccessibility('grayscale')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 transition-all flex items-center gap-4 group">
                    <span class="material-symbols-outlined group-hover:scale-125 transition-transform">gradient</span>
                    <span class="text-sm font-bold uppercase tracking-widest">Grayscale</span>
                </button>
                <button onclick="toggleAccessibility('high-contrast')" class="w-full text-left p-4 rounded-xl hover:bg-white/5 transition-all flex items-center gap-4 group">
                    <span class="material-symbols-outlined group-hover:scale-125 transition-transform">contrast</span>
                    <span class="text-sm font-bold uppercase tracking-widest">High Contrast</span>
                </button>
                <button onclick="toggleAccessibility('reset')" class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 mt-8 flex items-center gap-4 group">
                    <span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">restart_alt</span>
                    <span class="text-sm font-black uppercase tracking-widest">Reset All</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Emergency Hotline Modal -->
    <div id="hotline-modal" class="hidden fixed inset-0 z-[10001] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-[#271816]/90 backdrop-blur-xl transition-opacity" onclick="window.hideHotline()"></div>
        <div class="bg-white w-full max-w-md rounded-[56px] shadow-2xl relative z-10 overflow-hidden animate-scale-up border border-white/20">
            <div class="p-10 md:p-14 text-center">
                <div class="w-24 h-24 bg-red-50 text-[#af101a] rounded-[32px] flex items-center justify-center mx-auto mb-10 shadow-inner">
                    <span class="material-symbols-outlined text-5xl">support_agent</span>
                </div>
                <h2 class="text-4xl font-black text-[#271816] font-outfit uppercase tracking-tighter mb-10">Emergency Support</h2>
                <div class="space-y-4">
                    <a id="hotline-phone-link" href="tel:16226" class="flex items-center justify-between p-6 bg-[#af101a] text-white rounded-[32px] shadow-2xl hover:scale-[1.02] transition-all">
                        <div class="text-left">
                            <p class="text-[9px] font-black uppercase tracking-widest opacity-60">Toll Free</p>
                            <p id="hotline-phone-display" class="text-3xl font-black font-outfit">16226</p>
                        </div>
                        <span class="material-symbols-outlined text-3xl">call</span>
                    </a>
                    <a id="hotline-email-link" href="mailto:info@baust.edu.bd" class="flex items-center justify-between p-6 bg-slate-50 text-slate-600 rounded-[32px] border border-slate-100 hover:bg-slate-100 transition-all">
                        <div class="text-left">
                            <p class="text-[9px] font-black uppercase tracking-widest opacity-40">Official Email</p>
                            <p id="hotline-email-display" class="text-xl font-bold font-outfit">info@baust.edu.bd</p>
                        </div>
                        <span class="material-symbols-outlined">mail</span>
                    </a>
                </div>
                <script>
                    window.updateHotlineUI = () => {
                        const settings = JSON.parse(localStorage.getItem('bloodpulse_settings') || '{}');
                        const phone = settings.phone || '16226';
                        const email = settings.email || 'info@baust.edu.bd';
                        
                        const pDisplay = document.getElementById('hotline-phone-display');
                        const pLink = document.getElementById('hotline-phone-link');
                        const eDisplay = document.getElementById('hotline-email-display');
                        const eLink = document.getElementById('hotline-email-link');
                        
                        if (pDisplay) pDisplay.textContent = phone;
                        if (pLink) pLink.href = 'tel:' + phone;
                        if (eDisplay) eDisplay.textContent = email;
                        if (eLink) eLink.href = 'mailto:' + email;
                    };
                    // Run on interval to catch updates
                    setInterval(window.updateHotlineUI, 5000);
                </script>
                <button onclick="window.hideHotline()" class="mt-10 px-8 py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
